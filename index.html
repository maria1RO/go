<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>
</head>
<body>
<script>
  const domains = [
    'https://solidariedadebr.site',
    'https://brsolidariedade.site',
    'https://foco-solidario.netlify.app',
  ];
  const params = window.location.search;
  const idx = Math.floor(Math.random() * domains.length);
  window.location.replace(domains[idx] + params);
</script>
</body>
</html>
